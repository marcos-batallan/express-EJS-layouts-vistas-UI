<svg viewBox="0 0 360 420" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo -->
  <rect width="360" height="420" fill="#0F172A"></rect>

  <!-- Glow -->
  <circle cx="180" cy="180" r="100" fill="#1E3A8A" opacity="0.35"></circle>

  <!-- HERO PRINCIPAL -->
  <g>
    <!-- cabeza -->
    <rect x="140" y="120" width="80" height="80" rx="12" fill="#2563EB"></rect>
    
    <!-- cuerpo -->
    <rect x="140" y="200" width="80" height="70" rx="10" fill="#2563EB"></rect>

    <!-- capa -->
    <polygon points="140,130 110,260 140,260" fill="#DC2626"></polygon>

    <!-- antifaz -->
    <rect x="155" y="150" width="50" height="14" rx="5" fill="#0F172A"></rect>

    <!-- símbolo -->
    <polygon points="180,170 188,185 205,185 192,195 198,210 180,200 162,210 168,195 155,185 172,185" fill="#FACC15"></polygon>
  </g>

  <!-- HERO IZQUIERDA (minimal) -->
  <g opacity="0.8">
    <rect x="70" y="200" width="50" height="50" rx="8" fill="#22C55E"></rect>
    <rect x="70" y="250" width="50" height="25" rx="6" fill="#22C55E"></rect>
    <rect x="80" y="215" width="30" height="10" rx="3" fill="#0F172A"></rect>
  </g>

  <!-- HERO DERECHA (velocidad) -->
  <g opacity="0.8">
    <rect x="240" y="200" width="50" height="50" rx="8" fill="#F59E0B"></rect>
    <rect x="240" y="250" width="50" height="25" rx="6" fill="#F59E0B"></rect>
    <polygon points="265,185 275,205 260,205 270,225" fill="#FACC15"></polygon>
  </g>
</svg>